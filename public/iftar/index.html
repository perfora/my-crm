<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Netcom İftar Buluşması</title>
  <link rel="icon" type="image/jpeg" href="./netcom-40yil.jpg">
  <style>
    :root {
      --bg: #121A26;
      --btn-bg: #111827;
      --btn-border: #d4af37;
      --btn-text: #ffffff;
      --btn-hover-bg: #d4af37;
      --btn-hover-text: #111827;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: Arial, sans-serif;
      padding: 16px;
    }
    .hero {
      width: min(96vw, 1200px);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      background: var(--bg);
    }
    .hero img {
      display: block;
      width: 100%;
      height: auto;
    }
    .city-links {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px 12px 18px;
      background: #0f172a;
    }
    .city-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 12px;
      border: 2px solid var(--btn-border);
      color: var(--btn-text);
      background: var(--btn-bg);
      font-weight: 700;
      min-width: 130px;
      transition: all .18s ease;
    }
    .city-btn:hover {
      background: var(--btn-hover-bg);
      color: var(--btn-hover-text);
    }
  </style>
</head>
<body>
  <main class="hero">
    <img src="./analogo-secim.png" alt="Netcom İftar Buluşması - Şehir Seçimi">
    <div class="city-links">
      <a class="city-btn" href="./konya.html">Konya</a>
      <a class="city-btn" href="./kayseri.html">Kayseri</a>
      <a class="city-btn" href="./istanbul.html">İstanbul</a>
    </div>
  </main>
</body>
</html>
