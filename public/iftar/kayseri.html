<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Netcom Kayseri - Kayıtlar Kapandı</title>
  <link rel="icon" type="image/jpeg" href="./netcom-40yil.jpg">
  <style>
    :root { --bg: #000000; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      padding: 16px;
      font-family: Arial, sans-serif;
    }
    .hero {
      width: min(96vw, 1200px);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }
    .hero img { display: block; width: 100%; height: auto; }
    .links {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 14px;
      background: #111827;
    }
    .links a {
      color: #f3b64b;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="hero">
    <img src="./close.png" alt="Kayseri kayıtları kapandı">
    <div class="links">
      <a href="./index.html">Şehir Seçimine Dön</a>
      <a href="./istanbul.html">İstanbul Kayıt</a>
    </div>
  </main>
</body>
</html>
